<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KasBullet | Institutional Intelligence for Kaspa</title>
  <meta name="description" content="KasBullet is an institutional intelligence terminal for Kaspa, built around objective market, supply, network, cycle, summary and feed containers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/panels.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="app-header">
    <div class="header-container">
      <a class="brand" href="#top" aria-label="KasBullet home">
        <img src="assets/kasbullet-logo.png" class="brand-mark" alt="">
        <span class="brand-text">KasBullet</span>
      </a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="#market-intelligence">Markets</a>
        <a href="#supply-intelligence">Supply</a>
        <a href="#network-intelligence">Network</a>
        <a href="#cycle-intelligence">Cycle</a>
        <a href="#market-intelligence-feed">Feed</a>
      </nav>
    </div>
  </header>

  <main class="dashboard" id="top">
    <h1 class="visually-hidden">KasBullet institutional intelligence terminal for Kaspa</h1>

    <section class="module intelligence-strip" id="live-intelligence-ribbon" aria-labelledby="ribbon-title">
      <div id="ribbon-header"></div>
      <div class="ribbon-grid" id="ribbon-grid" aria-live="polite"></div>
    </section>

    <section class="dashboard-grid primary-workspace" id="main-dashboard" aria-label="Main dashboard">
      <aside class="module" aria-labelledby="market-snapshot-title">
        <div id="market-snapshot-header"></div>
        <div class="market-list" id="market-snapshot" aria-live="polite"></div>
      </aside>

      <article class="module module-large chart-panel" aria-labelledby="primary-chart-title">
        <div id="primary-chart-header"></div>
        <div class="chart-toolbar" id="chart-toolbar" aria-label="Kaspa market terminal toolbar"></div>
        <div class="chart-stats" id="chart-stats" aria-live="polite"></div>
        <div class="chart-shell">
          <canvas id="kasChart" aria-label="KAS price chart"></canvas>
          <div class="chart-fallback" id="chart-fallback" hidden></div>
        </div>
      </article>

      <section class="module cycle-strip" id="cycle-strip" aria-labelledby="cycle-strip-title">
        <div id="cycle-strip-header"></div>
        <div class="cycle-strip-grid" id="cycle-strip-grid" aria-live="polite"></div>
      </section>
    </section>

    <section class="module" id="market-intelligence" aria-labelledby="market-intelligence-title">
      <div id="market-intelligence-header"></div>
      <div class="stat-grid" id="market-grid" aria-live="polite"></div>
    </section>

    <section class="module" id="supply-intelligence" aria-labelledby="supply-intelligence-title">
      <div id="supply-intelligence-header"></div>
      <div class="stat-grid" id="supply-grid" aria-live="polite"></div>
    </section>

    <section class="module" id="network-intelligence" aria-labelledby="network-intelligence-title">
      <div id="network-intelligence-header"></div>
      <div class="stat-grid" id="network-grid" aria-live="polite"></div>
    </section>

    <section class="module" id="cycle-intelligence" aria-labelledby="cycle-intelligence-title">
      <div id="cycle-intelligence-header"></div>
      <div class="stat-grid" id="cycle-grid" aria-live="polite"></div>
    </section>

    <section class="module executive-summary" id="market-intelligence-summary" aria-labelledby="market-intelligence-summary-title">
      <div id="market-intelligence-summary-header"></div>
      <div class="summary-panel" id="summary-panel" aria-live="polite"></div>
    </section>

    <section class="module" id="market-intelligence-feed" aria-labelledby="market-intelligence-feed-title">
      <div id="market-intelligence-feed-header"></div>
      <div class="feed-category-grid" id="feed-category-grid"></div>
      <div class="alerts-grid" id="alerts-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>KasBullet aggregates objective public market and network context for research. Not financial advice.</p>
    <p>Data sources: CoinGecko public API, local alert feed, kas.fyi links.</p>
  </footer>

  <script src="assets/js/services.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/comparison.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
