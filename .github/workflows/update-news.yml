name: Update Kaspa Intelligence Feed

on:
  schedule:
    # Runs every 6 hours. GitHub's scheduler is approximate.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Generate intelligence feed from verified source
        working-directory: scripts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_HANDLE: ${{ vars.YOUTUBE_CHANNEL_HANDLE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-news.mjs

      - name: Commit updated feed
        run: |
          git config user.name "kasbullet-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          git diff --quiet --cached || git commit -m "chore: update market intelligence feed"
          git push
